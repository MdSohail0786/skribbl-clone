services:
  - type: web
    name: doodle-duel-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DEFAULT_MAX_PLAYERS
        value: 8
      - key: DEFAULT_ROUNDS
        value: 3
      - key: DEFAULT_DRAW_TIME
        value: 80
